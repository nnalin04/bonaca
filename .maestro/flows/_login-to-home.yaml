appId: com.anonymous.bonaca
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "Send OTP"
    timeout: 40000
- tapOn: "Mobile number"
- inputText: "9876543210"
- tapOn: "Send OTP"
- extendedWaitUntil:
    visible: "Verify OTP"
    timeout: 15000
- tapOn:
    id: "otp-digit-0"
- inputText: "1"
- tapOn:
    id: "otp-digit-1"
- inputText: "2"
- tapOn:
    id: "otp-digit-2"
- inputText: "3"
- tapOn:
    id: "otp-digit-3"
- inputText: "4"
- extendedWaitUntil:
    visible: "Complete Your Profile"
    timeout: 15000
- tapOn: "Enter name"
- inputText: "Test User"
- hideKeyboard
- tapOn: "Gender field, Select"
- extendedWaitUntil:
    visible: "Male"
    timeout: 10000
- tapOn: "Male"
- extendedWaitUntil:
    notVisible: "Prefer not to say"
    timeout: 10000
- tapOn: "DOB field, DD/MM/YYYY"
- extendedWaitUntil:
    visible: "Date of Birth"
    timeout: 10000
- tapOn: "Confirm date of birth"
- extendedWaitUntil:
    notVisible: "Date of Birth"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Connect Your Wearable"
    timeout: 15000
- tapOn: "Skip for Now"
- extendedWaitUntil:
    visible: "Shared with you"
    timeout: 15000
