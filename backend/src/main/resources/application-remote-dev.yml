spring:
  datasource:
    url: ${BONACA_DATABASE_URL}
    username: ${BONACA_DATABASE_USER}
    password: ${BONACA_DATABASE_PASSWORD}

bonaca:
  jwt:
    secret: ${JWT_SECRET}
  proxy-security:
    enabled: true
    secret: ${BACKEND_SECRET}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    template-id: ${MSG91_TEMPLATE_ID:}

logging:
  level:
    com.bonaca.backend.auth.service.otp: INFO
