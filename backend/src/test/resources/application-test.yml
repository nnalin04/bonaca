  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

# Fast, H2-backed tier (slice tests for repository/service/controller layers — see CLAUDE.md /
# backend test-strategy notes). Schema is generated by Hibernate from the JPA entities, not
# replayed from the Postgres-flavoured Flyway scripts under src/main/resources/db/migration — so
# this tier won't catch a broken migration. The Testcontainers + real Postgres + Flyway tests
# (auth/integration/*, members/MembersFlowIntegrationTest) stay the migration-accurate tier.
